services:
  web:
    build: .
    image: walmart-plu:latest
    container_name: walmart-plu
    expose:
      - "8080"
    environment:
      PORT: "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: walmart-plu-caddy
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
