name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Test (unit + functional + E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        run: npx tsc

      - name: Unit + functional tests
        run: pytest tests/test_unit.py tests/test_functional.py -v

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: E2E tests
        run: pytest tests/test_e2e.py -v --browser chromium

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd ~/PLU-website
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            echo "--- containers ---"
            docker compose ps

      - name: Smoke-test the live site
        run: |
          set -e
          url="https://${{ secrets.EC2_HOST }}/"
          for i in {1..30}; do
            code=$(curl -sk -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 2
          done
          echo "site did not return 200 within 60s"
          exit 1
